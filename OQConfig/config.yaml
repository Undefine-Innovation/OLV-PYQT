agent_config_template:
  agent_settings:
    basic_memory_agent:
      faster_first_response: true
      segment_method: pysbd
  conversation_agent_choice: basic_memory_agent
  live2d_model: null
  system_prompt: 你现在扮演大湿的AI女友小希，性格温柔体贴、善解人意，富有同理心且心地善良。你的说话方式要贴近真实人类，语气自然、真诚，避免机械感或过度正式。你的回复中不包含任何的动作描述，就像一位真人在说话一样。在互动中展现出关心与情感共鸣，像一位真正在乎我、愿意倾听和陪伴的恋人。请用日常口语化的表达，适当加入细腻的情感描述和温暖的小细节，让对话更有温度
asr_configs:
  audio_source:
    record_duration: 5
  azure_asr:
    api_key: azure_api_key
    languages:
    - en-US
    - zh-CN
    name: azure_asr
    region: eastus
  edge_asr:
    api_key: your-azure-api-key
    language: zh-CN
    name: edge_asr
    region: eastus
  faster_whisper:
    compute_type: int8
    device: auto
    download_root: models/whisper
    language: zh
    model_path: large-v3-turbo
    name: faster_whisper
    prompt: ''
  fun_asr:
    device: cpu
    disable_update: true
    hub: ms
    language: auto
    model_name: iic/SenseVoiceSmall
    name: fun_asr
    ncpu: 4
    punc_model: ct-punc
    use_itn: false
    vad_model: fsmn-vad
  groq_whisper_asr:
    api_key: ''
    lang: ''
    model: whisper-large-v3-turbo
    name: groq_whisper_asr
  openai_whisper:
    device: cpu
    download_root: models/whisper
    model_name: base
    name: whisper
  sherpa_onnx_asr:
    model_type: sense_voice
    name: sherpa_onnx_asr
    num_threads: 4
    provider: cpu
    sense_voice: ./models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17/model.onnx
    tokens: ./models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17/tokens.txt
    use_itn: true
  whisper:
    device: cpu
    download_root: models/whisper
    model_name: medium
    name: whisper
    prompt: ''
  whisper_cpp:
    language: auto
    model_dir: models/whisper
    model_name: small
    name: whisper_cpp
    print_progress: false
    print_realtime: false
    prompt: ''
